<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Bryan's Café</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <a href="index.html" class="logo">
        <!-- Verifica que el nombre sea logo.png o logo.jpg -->
        <img src="assets/logo.png" alt="Bryan's Café Logo" style="height: 100%; max-height: 120px;">
    </a>
    <nav>
        <ul>
            <li><a href="index.html">About</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
    </header>

    <main>
        <h1 class="section-title">Get in Touch & Locations</h1>
        <div class="contact-wrapper">
            <!-- Formulario a la izquierda -->
            <div>
                <h2 style="margin-bottom: 1rem;">Send an Enquiry</h2>
                <form id="contact-form">
                    <input type="text" id="name" placeholder="Your Name" required>
                    <input type="email" id="email" placeholder="Your Email Address" required>
                    <textarea id="message" rows="5" placeholder="Your Message" required></textarea>
                    <button type="submit">SUBMIT ENQUIRY</button>
                </form>
            </div>
            
            <!-- Sucursales a la derecha -->
            <div>
                <h2 style="margin-bottom: 1rem;">Our Branches</h2>
                <!-- El JS inyectará las sucursales aquí -->
                <div id="dynamic-branches">Loading locations...</div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> Bryan's Café. All rights reserved.</p>
        <p><a href="privacy.html" target="_blank">Privacy Policy</a></p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
